name: PR Build

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      SOLUTION: Omnicasa.Schedule.sln
      LIBRARY_PROJECT: src/Omnicasa.Schedule/Omnicasa.Schedule.csproj
      SAMPLE_PROJECT: samples/Omnicasa.Schedule.Sample/Omnicasa.Schedule.Sample.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Setup Xcode (latest stable on runner)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install MAUI workloads (pin to iOS 18 / Xcode 16-compatible set)
        # `dotnet workload install maui` otherwise upgrades to the latest set
        # (currently 9.0.31x), which bundles the iOS 26.5 SDK and requires
        # Xcode 26+. Pin to a 9.0.300-era set whose iOS manifest still targets
        # iOS 18.x, matching what's available on `macos-latest` runners.
        run: dotnet workload install maui --version 9.0.300 --skip-sign-check

      - name: Restore
        run: dotnet restore "$SOLUTION"

      - name: Build library (Release)
        run: |
          dotnet build "$LIBRARY_PROJECT" \
            --configuration Release \
            --no-restore \
            -warnaserror

      - name: Build sample (Debug)
        run: |
          dotnet build "$SAMPLE_PROJECT" \
            --configuration Debug \
            --no-restore
