name: PR Build

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      SOLUTION: Omnicasa.Schedule.sln
      LIBRARY_PROJECT: src/Omnicasa.Schedule/Omnicasa.Schedule.csproj
      SAMPLE_PROJECT: samples/Omnicasa.Schedule.Sample/Omnicasa.Schedule.Sample.csproj

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workloads
        run: dotnet workload install maui --skip-sign-check

      - name: Restore
        run: dotnet restore "$SOLUTION"

      - name: Build library (Release)
        run: |
          dotnet build "$LIBRARY_PROJECT" \
            --configuration Release \
            --no-restore \
            -warnaserror

      - name: Build sample (Debug)
        run: |
          dotnet build "$SAMPLE_PROJECT" \
            --configuration Debug \
            --no-restore
